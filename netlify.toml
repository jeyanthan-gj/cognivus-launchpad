# ══════════════════════════════════════════════════════════════════════════════
# Netlify configuration — Cognivus
# Covers: build, HTTPS enforcement, security headers, CORS, redirects,
#         and abuse-protection response headers.
# ══════════════════════════════════════════════════════════════════════════════

[build]
  command = "npm run build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "22"
  NPM_VERSION  = "10"

[build.processing]
  skip_processing = false

# ── HTTP → HTTPS redirects (edge-level, before any app code runs) ─────────────
[[redirects]]
  from   = "http://cognivus.ai/*"
  to     = "https://cognivus.ai/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "http://www.cognivus.ai/*"
  to     = "https://cognivus.ai/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "https://www.cognivus.ai/*"
  to     = "https://cognivus.ai/:splat"
  status = 301
  force  = true

# ── Security + abuse-protection headers (every response) ─────────────────────
[[headers]]
  for = "/*"
  [headers.values]

    # ── Transport ────────────────────────────────────────────────────────────
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

    # ── Clickjacking / framing ────────────────────────────────────────────────
    X-Frame-Options = "DENY"

    # ── MIME sniffing ─────────────────────────────────────────────────────────
    X-Content-Type-Options = "nosniff"

    # ── Referrer ──────────────────────────────────────────────────────────────
    Referrer-Policy = "strict-origin-when-cross-origin"

    # ── Browser feature lockdown ──────────────────────────────────────────────
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=()"

    # ── Cross-origin isolation ────────────────────────────────────────────────
    Cross-Origin-Opener-Policy   = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"

    # ── Content Security Policy ───────────────────────────────────────────────
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.supabase.co; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;"

    # ── Rate-limit headers ────────────────────────────────────────────────────
    # Expose X-RateLimit-* and Retry-After so legitimate clients can implement
    # exponential backoff instead of hammering the server on rejection.
    Access-Control-Expose-Headers = "X-RateLimit-Limit, X-RateLimit-Remaining, X-RateLimit-Window, X-RateLimit-Reset, Retry-After"

# ── Static asset caching ──────────────────────────────────────────────────────
# Vite appends content hashes — these bundles are safe to cache indefinitely.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Admin routes — no caching ─────────────────────────────────────────────────
[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    Pragma        = "no-cache"

# ── Server function endpoints — CORS + rate-limit headers ────────────────────
[[headers]]
  for = "/_server/*"
  [headers.values]
    Access-Control-Allow-Origin  = "https://cognivus.ai"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Access-Control-Max-Age       = "86400"
    Access-Control-Expose-Headers = "X-RateLimit-Limit, X-RateLimit-Remaining, X-RateLimit-Window, X-RateLimit-Reset, Retry-After"
